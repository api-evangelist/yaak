aid: yaak
name: Yaak
description: >-
  Yaak is an open-source desktop API client for organizing and executing REST,
  GraphQL, WebSockets, Server Sent Events, and gRPC requests. Built with Tauri,
  Rust, and React, it is a privacy-first, fast desktop client with no telemetry
  and no cloud lock-in.
